<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruleta y Rangos de Filas</title>
    <style>
        /* Estilo iOS Dark Mode */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #ebebf599;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input[type="number"], textarea {
            background-color: #1c1c1e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            font-size: 17px;
            outline: none;
            -webkit-appearance: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        input::placeholder, textarea::placeholder {
            color: #636366;
        }

        button {
            background-color: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #0070d6;
        }

        .result-card {
            background-color: #1c1c1e;
            border-radius: 14px;
            padding: 24px;
            margin-top: 30px;
            display: none;
        }

        .result-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .success {
            text-align: center;
            font-size: 15px;
            color: #32d74b;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .assignment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #38383a;
        }

        .assignment-item:last-child {
            border-bottom: none;
        }

        .name-section {
            display: flex;
            flex-direction: column;
        }

        .name {
            font-size: 17px;
            font-weight: 500;
        }

        .total-rows-info {
            font-size: 13px;
            color: #ebebf599;
            margin-top: 2px;
        }

        .rows-badge {
            background-color: #38383a;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
        }

        .extra-row {
            background-color: #ff9f0a; /* Naranja para destacar filas extra */
            color: #000000;
        }
