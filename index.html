<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruleta de Filas</title>
    <style>
        /* Estilo iOS Dark Mode */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #ebebf599;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input[type="number"], textarea {
            background-color: #1c1c1e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            font-size: 17px;
            outline: none;
            -webkit-appearance: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        input::placeholder, textarea::placeholder {
            color: #636366;
        }

        button {
            background-color: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #0070d6;
        }

        .result-card {
            background-color: #1c1c1e;
            border-radius: 14px;
            padding: 24px;
            margin-top: 30px;
            display: none;
        }

        .result-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .success {
            text-align: center;
            font-size: 15px;
            color: #32d74b;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .assignment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #38383a;
        }

        .assignment-item:last-child {
            border-bottom: none;
        }

        .name {
            font-size: 17px;
            font-weight: 500;
        }

        .rows-badge {
            background-color: #38383a;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
        }

        .extra-row {
            background-color: #ff9f0a; /* Naranja iOS para destacar a los que les tocó más */
            color: #000000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ruleta de Filas ✈️🎲</h1>

        <div class="input-group">
            <label for="total-rows">Total de filas en el avión</label>
            <input type="number" id="total-rows" placeholder="Ej. 30 o 31" inputmode="numeric">
        </div>

        <div class="input-group">
            <label for="worker-names">Nombres del personal (separados por coma)</label>
            <textarea id="worker-names" placeholder="Ej. Cesar, Juan, María, Pedro..."></textarea>
        </div>

        <button onclick="calculateAndSpin()">Girar Ruleta y Asignar</button>

        <div class="result-card" id="result-card">
            <div class="success" id="summary-text"></div>
            <ul class="assignment-list" id="assignment-list"></ul>
        </div>
    </div>

    <script>
        // Función para mezclar un arreglo (La "Ruleta")
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function calculateAndSpin() {
            const totalRows = parseInt(document.getElementById('total-rows').value);
            const rawNames = document.getElementById('worker-names').value;
            
            // Limpiar y separar los nombres (por comas o saltos de línea)
            const namesArray = rawNames.split(/[\n,]+/).map(name => name.trim()).filter(name => name !== '');
            const totalWorkers = namesArray.length;

            if (!totalRows || totalWorkers === 0) {
                alert("Por favor, ingresa el total de filas y al menos un nombre.");
                return;
            }

            // Cálculos
            const baseRows = Math.floor(totalRows / totalWorkers);
            const remainder = totalRows % totalWorkers;

            // Girar la ruleta (mezclar los nombres al azar)
            const shuffledNames = shuffleArray([...namesArray]);

            // Preparar la interfaz de resultados
            const resultCard = document.getElementById('result-card');
            const summaryText = document.getElementById('summary-text');
            const assignmentList = document.getElementById('assignment-list');
            
            assignmentList.innerHTML = ''; // Limpiar lista anterior

            if (remainder === 0) {
                summaryText.innerHTML = `✅ División exacta. A todos les tocan <b>${baseRows} filas</b>.`;
            } else {
                summaryText.innerHTML = `🎲 Ruleta girada. Las filas extra se asignaron al azar.`;
            }

            // Asignar filas persona por persona
            shuffledNames.forEach((name, index) => {
                // Si el índice es menor que el residuo, le toca una fila extra
                const assignedRows = (index < remainder) ? baseRows + 1 : baseRows;
                const isExtra = (index < remainder && remainder > 0);

                // Crear el elemento de la lista
                const listItem = document.createElement('li');
                listItem.className = 'assignment-item';
                
                const badgeClass = isExtra ? 'rows-badge extra-row' : 'rows-badge';
                
                listItem.innerHTML = `
                    <span class="name">${name}</span>
                    <span class="${badgeClass}">${assignedRows} filas</span>
                `;
                
                assignmentList.appendChild(listItem);
            });

            // Mostrar resultados con animación
            resultCard.classList.remove('active');
            void resultCard.offsetWidth; // Truco para reiniciar la animación
            resultCard.classList.add('active');
        }
    </script>
</body>
</html>
