<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ruleta y Asignación</title>
    <style>
        /* Estilo iOS Dark Mode */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
            padding-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #ebebf599;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input[type="number"], input[type="text"] {
            background-color: #1c1c1e;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            font-size: 17px;
            outline: none;
            -webkit-appearance: none;
        }

        input::placeholder {
            color: #636366;
        }

        /* Controles para agregar personal */
        .add-worker-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .add-worker-group input {
            flex: 1;
        }

        .btn-add {
            background-color: #32d74b; /* Verde iOS */
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Lista del equipo */
        .team-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #1c1c1e;
            border-radius: 10px;
            overflow: hidden;
        }

        .team-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #38383a;
        }

        .team-item:last-child {
            border-bottom: none;
        }

        /* Checkbox estilo iOS */
        .team-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            accent-color: #0a84ff;
            cursor: pointer;
        }

        .team-item .worker-name {
            flex: 1;
            font-size: 17px;
        }

        .btn-delete {
            background-color: transparent;
            color: #ff453a; /* Rojo iOS */
            border: none;
            font-size: 22px;
            padding: 0 5px;
            cursor: pointer;
        }

        /* Botón Principal */
        .btn-main {
            background-color: #0a84ff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        .btn-main:active {
            background-color: #0070d6;
        }

        /* Tarjeta de resultados */
        .result-card {
            background-color: #1c1c1e;
            border-radius: 14px;
            padding: 24px;
            margin-top: 30px;
            display: none;
        }

        .result-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .success {
            text-align: center;
            font-size: 15px;
            color: #32d74b;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .assignment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #38383a;
        }

        .assignment-item:last-child {
            border-bottom: none;
        }

        .name-section {
            display: flex;
            flex-direction: column;
        }

        .name {
            font-size: 17px;
            font-weight: 500;
        }

        .total-rows-info {
            font-size: 13px;
            color: #ebebf599;
            margin-top: 2px;
        }

        .rows-badge {
            background-color: #38383a;
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-align: right;
            white-space: nowrap;
        }

        .extra-row {
            background-color: #ff9f0a;
            color: #000000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Asignación de Filas ✈️</h1>

        <div class="input-group">
            <label for="total-rows">Total de filas en el avión</label>
            <input type="number" id="total-rows" placeholder="Ej. 30 o 31" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>Personal (Marca a los que asistieron hoy)</label>
            <div class="add-worker-group">
                <input type="text" id="new-worker-name" placeholder="Nuevo nombre...">
                <button class="btn-add" onclick="addWorker()">Agregar</button>
            </div>
            <!-- Aquí se mostrará la lista guardada -->
            <ul class="team-list" id="team-list"></ul>
        </div>

        <button class="btn-main" onclick="calculateAndSpin()">Girar Ruleta y Asignar</button>

        <div class="result-card" id="result-card">
            <div class="success" id="summary-text"></div>
            <ul class="assignment-list" id="assignment-list"></ul>
        </div>
    </div>

    <script>
        // --- GESTIÓN DE LA LISTA DE PERSONAL ---
        
        // Cargar lista desde la memoria del teléfono (o crear una vacía)
        let team = JSON.parse(localStorage.getItem('savedTeam')) || [];

        // Función para guardar los cambios en la memoria
        function saveTeam() {
            localStorage.setItem('savedTeam', JSON.stringify(team));
        }

        // Función para mostrar la lista en pantalla
        function renderTeamList() {
            const listElement = document.getElementById('team-list');
            listElement.innerHTML = ''; // Limpiar lista

            team.forEach((worker, index) => {
                const li = document.createElement('li');
                li.className = 'team-item';
                
                // Si la persona está activa, marcar el checkbox
                const checkedHTML = worker.active ? 'checked' : '';

                li.innerHTML = `
                    <input type="checkbox" onchange="toggleWorker(${index})" ${checkedHTML}>
                    <span class="worker-name">${worker.name}</span>
                    <button class="btn-delete" onclick="deleteWorker(${index})">×</button>
                `;
                listElement.appendChild(li);
            });
        }

        // Función para agregar un nombre nuevo
        function addWorker() {
            const input = document.getElementById('new-worker-name');
            const name = input.value.trim();

            if (name === '') return; // No agregar si está vacío

            // Agregar a la lista (por defecto activo)
            team.push({ name: name, active: true });
            input.value = ''; // Limpiar cajita
            
            saveTeam();
            renderTeamList();
        }

        // Función para activar/desactivar el checkbox de una persona
        function toggleWorker(index) {
            team[index].active = !team[index].active;
            saveTeam();
        }

        // Función para borrar a alguien definitivamente de la lista
        function deleteWorker(index) {
            // Confirmación opcional para no borrar por accidente
            if (confirm(`¿Borrar a ${team[index].name} de la lista guardada?`)) {
                team.splice(index, 1);
                saveTeam();
                renderTeamList();
            }
        }

        // Mostrar la lista apenas carga la página
        window.onload = renderTeamList;

        // --- LÓGICA DE LA RULETA Y ASIGNACIÓN ---

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function calculateAndSpin() {
            const totalRows = parseInt(document.getElementById('total-rows').value);
            
            // Filtrar SOLO a los que tienen la "palomita" puesta
            const activeWorkers = team.filter(worker => worker.active).map(worker => worker.name);
            const totalWorkers = activeWorkers.length;

            if (!totalRows || totalWorkers === 0) {
                alert("Ingresa el total de filas y asegúrate de marcar al menos a una persona en la lista.");
                return;
            }

            if (totalWorkers > totalRows) {
                alert("Hay más personal marcado que filas en el avión. Revisa los datos.");
                return;
            }

            const baseRows = Math.floor(totalRows / totalWorkers);
            const remainder = totalRows % totalWorkers;

            // Giramos la ruleta solo con los que vinieron hoy
            const shuffledNames = shuffleArray([...activeWorkers]);

            const resultCard = document.getElementById('result-card');
            const summaryText = document.getElementById('summary-text');
            const assignmentList = document.getElementById('assignment-list');
            
            assignmentList.innerHTML = ''; 

            if (remainder === 0) {
                summaryText.innerHTML = `✅ A todos les tocan <b>${baseRows} filas</b>. Asignación consecutiva.`;
            } else {
                summaryText.innerHTML = `🎲 Las filas extra se asignaron al azar y se organizaron por zona.`;
            }

            let currentRow = 1;

            shuffledNames.forEach((name, index) => {
                const assignedRows = (index < remainder) ? baseRows + 1 : baseRows;
                const isExtra = (index < remainder && remainder > 0);

                const endRow = currentRow + assignedRows - 1;
                const rangeText = (assignedRows === 1) ? `Fila ${currentRow}` : `De la ${currentRow} - ${endRow}`;

                const listItem = document.createElement('li');
                listItem.className = 'assignment-item';
                
                const badgeClass = isExtra ? 'rows-badge extra-row' : 'rows-badge';
                
                listItem.innerHTML = `
                    <div class="name-section">
                        <span class="name">${name}</span>
                        <span class="total-rows-info">(Hace ${assignedRows} filas)</span>
                    </div>
                    <span class="${badgeClass}">${rangeText}</span>
                `;
                
                assignmentList.appendChild(listItem);
                
                currentRow = endRow + 1;
            });

            resultCard.classList.remove('active');
            void resultCard.offsetWidth; 
            resultCard.classList.add('active');
        }
    </script>
</body>
</html>
